<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>泓豪新婚祝福卡片</title>
    <style>
:root {
  --ink: #342f2b;
  --muted: #746c61;
  --paper: #fff9f1;
  --paper-strong: #fffdf8;
  --blush: #ef9da1;
  --rose: #f7d9d3;
  --gold: #bd8b3b;
  --sage: #8da98b;
  --blue: #b8d9e8;
  --line: rgba(91, 72, 50, 0.16);
  --shadow: 0 22px 70px rgba(72, 49, 35, 0.16);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(184, 217, 232, 0.42), transparent 30rem),
    linear-gradient(135deg, #fffaf3 0%, #fff4f1 46%, #f7f2e6 100%);
}

button,
input,
textarea {
  font: inherit;
}

.page-shell {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0 42px;
}

.hero-card {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper-strong);
  box-shadow: var(--shadow);
}

.hero-image-wrap {
  position: relative;
  min-height: 360px;
  background: #f6e8dc;
}

.hero-image {
  display: block;
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
}

.seal {
  position: absolute;
  right: 20px;
  bottom: 20px;
  padding: 10px 14px;
  border: 1px solid rgba(255, 255, 255, 0.76);
  border-radius: 999px;
  color: #ffffff;
  background: rgba(52, 47, 43, 0.48);
  backdrop-filter: blur(10px);
  font-size: 0.95rem;
  letter-spacing: 0;
}

.card-copy {
  padding: clamp(22px, 4vw, 42px);
}

.kicker {
  margin: 0 0 8px;
  color: var(--gold);
  font-size: 0.9rem;
  font-weight: 700;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 14px;
  font-size: clamp(2rem, 5vw, 4.4rem);
  line-height: 1.05;
  letter-spacing: 0;
}

.lead {
  max-width: 760px;
  margin-bottom: 24px;
  color: #5a5148;
  font-size: clamp(1.04rem, 2vw, 1.28rem);
  line-height: 1.85;
}

.gift-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 26px;
}

.gift-note {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  min-height: 128px;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 248, 239, 0.9));
}

.gift-note h2 {
  margin-bottom: 8px;
  font-size: 1.2rem;
}

.gift-note p {
  margin-bottom: 0;
  color: var(--muted);
  line-height: 1.7;
}

.gift-icon {
  position: relative;
  flex: 0 0 auto;
  width: 58px;
  height: 58px;
}

.blanket {
  border: 2px solid rgba(189, 139, 59, 0.48);
  border-radius: 14px;
  background:
    linear-gradient(90deg, transparent 47%, rgba(239, 157, 161, 0.9) 48% 54%, transparent 55%),
    linear-gradient(180deg, transparent 43%, rgba(239, 157, 161, 0.9) 44% 52%, transparent 53%),
    repeating-linear-gradient(135deg, #fff2e4 0 9px, #f8d6cb 9px 18px);
  box-shadow: inset 0 -8px 0 rgba(189, 139, 59, 0.08);
}

.blanket::after {
  position: absolute;
  top: -11px;
  left: 13px;
  width: 30px;
  height: 22px;
  border-radius: 50% 50% 45% 45%;
  background: var(--blush);
  content: "";
  transform: rotate(-10deg);
}

.oven {
  border: 3px solid #e7d2b5;
  border-radius: 12px;
  background: #fff8ee;
  box-shadow: inset 0 -7px 0 rgba(189, 139, 59, 0.16);
}

.oven::before {
  position: absolute;
  left: 8px;
  top: 16px;
  width: 31px;
  height: 24px;
  border: 2px solid #5c5148;
  border-radius: 5px;
  background: linear-gradient(135deg, #8f5f2d, #f6c76c);
  content: "";
}

.oven::after {
  position: absolute;
  right: 8px;
  top: 16px;
  width: 8px;
  height: 26px;
  border-radius: 999px;
  background: linear-gradient(#5f5751 0 7px, transparent 7px 11px, #5f5751 11px 18px, transparent 18px);
  content: "";
}

.signature {
  margin-bottom: 0;
  color: var(--sage);
  font-weight: 700;
}

.blessing-board {
  margin-top: 18px;
  padding: clamp(18px, 3vw, 28px);
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.88);
  box-shadow: 0 16px 44px rgba(72, 49, 35, 0.09);
}

.board-header {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 18px;
}

.board-header h2 {
  margin-bottom: 0;
  font-size: clamp(1.35rem, 3vw, 2rem);
}

.message-form {
  display: grid;
  grid-template-columns: minmax(140px, 220px) 1fr;
  gap: 14px;
}

.message-form label {
  display: grid;
  gap: 7px;
  color: var(--muted);
  font-size: 0.94rem;
  font-weight: 700;
}

.message-form input,
.message-form textarea {
  width: 100%;
  border: 1px solid rgba(91, 72, 50, 0.24);
  border-radius: 8px;
  color: var(--ink);
  background: #ffffff;
  outline: none;
}

.message-form input {
  min-height: 48px;
  padding: 0 13px;
}

.message-form textarea {
  min-height: 96px;
  resize: vertical;
  padding: 12px 13px;
  line-height: 1.6;
}

.message-form input:focus,
.message-form textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(189, 139, 59, 0.14);
}

.sticker-field {
  display: grid;
  grid-column: 1 / -1;
  gap: 10px;
  margin: 0;
  padding: 0;
  border: 0;
}

.sticker-field legend {
  color: var(--muted);
  font-size: 0.94rem;
  font-weight: 700;
}

.sticker-picker {
  display: grid;
  grid-template-columns: repeat(6, minmax(74px, 1fr));
  gap: 10px;
}

.sticker-button {
  display: grid;
  gap: 4px;
  align-content: center;
  justify-items: center;
  min-height: 74px;
  border: 1px solid rgba(91, 72, 50, 0.18);
  border-radius: 8px;
  color: var(--muted);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 245, 239, 0.9));
  cursor: pointer;
  font-weight: 700;
}

.sticker-button span {
  font-size: 1.9rem;
  line-height: 1;
}

.sticker-button small {
  font-size: 0.82rem;
}

.sticker-button.is-selected {
  border-color: rgba(189, 139, 59, 0.72);
  color: var(--ink);
  background: linear-gradient(180deg, #fffdf8, #ffece8);
  box-shadow: 0 0 0 3px rgba(239, 157, 161, 0.2);
}

.form-actions {
  display: flex;
  flex-wrap: wrap;
  grid-column: 1 / -1;
  gap: 10px;
  align-items: center;
}

.primary-button,
.ghost-button,
.file-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 0 16px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;
  letter-spacing: 0;
  text-decoration: none;
}

.primary-button {
  border: 1px solid #9f7230;
  color: #ffffff;
  background: linear-gradient(135deg, #ba8236, #d4a04a);
}

.ghost-button,
.file-button {
  border: 1px solid rgba(91, 72, 50, 0.22);
  color: var(--ink);
  background: rgba(255, 255, 255, 0.72);
}

.file-button input {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}

.share-output {
  margin-top: 12px;
  color: var(--sage);
  font-size: 0.94rem;
  line-height: 1.5;
}

.share-output textarea {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
}

.messages-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-top: 20px;
}

.message-card {
  position: relative;
  min-height: 132px;
  padding: 16px;
  border: 1px solid rgba(91, 72, 50, 0.14);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 247, 240, 0.84)),
    radial-gradient(circle at top right, rgba(184, 217, 232, 0.24), transparent 7rem);
}

.message-sticker {
  float: right;
  display: grid;
  place-items: center;
  width: 48px;
  height: 48px;
  margin-left: 12px;
  border: 1px solid rgba(189, 139, 59, 0.18);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.78);
  font-size: 1.55rem;
  box-shadow: 0 8px 22px rgba(72, 49, 35, 0.08);
}

.message-card p {
  margin-bottom: 14px;
  line-height: 1.75;
}

.message-card strong {
  color: var(--gold);
}

.message-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 14px;
}

.edit-message-button {
  min-height: 32px;
  padding: 0 12px;
  border: 1px solid rgba(91, 72, 50, 0.2);
  border-radius: 999px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.72);
  cursor: pointer;
  font-weight: 700;
}

.edit-message-button:hover {
  color: var(--ink);
  border-color: rgba(189, 139, 59, 0.48);
}

.empty-state {
  grid-column: 1 / -1;
  padding: 22px;
  border: 1px dashed rgba(91, 72, 50, 0.26);
  border-radius: 8px;
  color: var(--muted);
  text-align: center;
}

@media (max-width: 760px) {
  .page-shell {
    width: min(100% - 20px, 1180px);
    padding-top: 10px;
  }

  .hero-image-wrap {
    min-height: 0;
  }

  .hero-image {
    aspect-ratio: 4 / 5;
    object-position: center top;
  }

  .seal {
    right: 12px;
    bottom: 12px;
    font-size: 0.84rem;
  }

  .gift-row,
  .sticker-picker,
  .message-form,
  .messages-grid {
    grid-template-columns: 1fr;
  }

  .board-header {
    display: grid;
  }

  .ghost-button,
  .primary-button,
  .file-button {
    width: 100%;
  }
}

    </style>

              </button>

                <span aria-hidden="true">💍</span>
                <small>圓滿</small>
              </button>
              <button class="sticker-button" type="button" data-sticker="💕" aria-pressed="false">
                <span aria-hidden="true">💕</span>
                <small>相愛</small>
              </button>
              <button class="sticker-button" type="button" data-sticker="✨" aria-pressed="false">
                <span aria-hidden="true">✨</span>
                <small>閃亮</small>
              </button>
            </div>
          </fieldset>
          <div class="form-actions">
            <button class="primary-button" type="submit">送出祝福</button>
            <button class="ghost-button" id="exportButton" type="button">匯出祝福</button>
            <label class="file-button">
              匯入祝福

            </label>

        <div class="share-output" id="shareOutput" aria-live="polite"></div>
        <div class="messages-grid" id="messagesGrid" aria-live="polite"></div>
      </section>
    </main>
    <script>
(function () {
  var storageKey = "honghaoWeddingBlessingsV1";
  var messagesGrid = document.getElementById("messagesGrid");
  var messageForm = document.getElementById("messageForm");
  var nameInput = document.getElementById("nameInput");
  var messageInput = document.getElementById("messageInput");
  var copyLinkButton = document.getElementById("copyLinkButton");
  var exportButton = document.getElementById("exportButton");
  var importInput = document.getElementById("importInput");
  var shareOutput = document.getElementById("shareOutput");
  var stickerPicker = document.getElementById("stickerPicker");
  var stickerButtons = stickerPicker.querySelectorAll(".sticker-button");
  var submitButton = messageForm.querySelector(".primary-button");
  var editIndex = -1;
  var selectedSticker = "💝";
  var cancelEditButton = document.createElement("button");

  cancelEditButton.className = "ghost-button";
  cancelEditButton.hidden = true;
  cancelEditButton.textContent = "取消修正";
  cancelEditButton.type = "button";
  submitButton.insertAdjacentElement("afterend", cancelEditButton);

  var seedMessages = [
    {
      name: "總務科全體同仁",
      sticker: "🎉",
      text: "祝泓豪新婚快樂，往後每一天都有棉被的溫暖，也有烤箱剛出爐的甜香。"
    },
    {
      name: "大家",
      sticker: "💕",
      text: "願你們把日子過成最喜歡的樣子，互相照顧、互相珍惜，幸福一輩子。"
    }
  ];

  function isValidSticker(sticker) {
    return ["💝", "🥰", "🎉", "💍", "💕", "✨"].indexOf(sticker) >= 0;
  }

  function encodeMessages(messages) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(messages))));
  }

  function decodeMessages(value) {
    try {
      var json = decodeURIComponent(escape(atob(value)));
      var parsed = JSON.parse(json);
      return Array.isArray(parsed) ? sanitizeMessages(parsed) : null;
    } catch (error) {
      return null;
    }
  }

  function sanitizeMessages(items) {
    return items
      .filter(function (item) {
        return item && typeof item.text === "string" && item.text.trim();
      })
      .slice(0, 80)
      .map(function (item) {
        return {
          name: String(item.name || "匿名祝福").trim().slice(0, 16),
          sticker: isValidSticker(item.sticker) ? item.sticker : "",
          text: String(item.text).trim().slice(0, 90)
        };
      });
  }

  function readHashMessages() {
    var match = window.location.hash.match(/messages=([^&]+)/);
    return match ? decodeMessages(match[1]) : null;
  }

  function loadMessages() {
    var hashMessages = readHashMessages();
    if (hashMessages && hashMessages.length) {
      localStorage.setItem(storageKey, JSON.stringify(hashMessages));
      return hashMessages;
    }

    try {
      var saved = JSON.parse(localStorage.getItem(storageKey) || "null");
      return Array.isArray(saved) ? sanitizeMessages(saved) : seedMessages;
    } catch (error) {
      return seedMessages;
    }
  }

  function saveMessages(messages) {
    localStorage.setItem(storageKey, JSON.stringify(messages));
  }

  function renderMessages(messages) {
    messagesGrid.innerHTML = "";

    if (!messages.length) {
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "還沒有祝福，第一句就留給你。";
      messagesGrid.appendChild(empty);
      return;
    }

    messages.forEach(function (message, index) {
      var card = document.createElement("article");
      card.className = "message-card";

      if (message.sticker) {
        var sticker = document.createElement("div");
        sticker.className = "message-sticker";
        sticker.textContent = message.sticker;
        sticker.setAttribute("aria-label", "祝福表情包");
        card.appendChild(sticker);
      }

      var text = document.createElement("p");
      text.textContent = message.text;

      var name = document.createElement("strong");
      name.textContent = "— " + (message.name || "匿名祝福");

      var actions = document.createElement("div");
      actions.className = "message-actions";

      var editButton = document.createElement("button");
      editButton.className = "edit-message-button";
      editButton.dataset.index = String(index);
      editButton.textContent = "修正";
      editButton.type = "button";

      actions.appendChild(editButton);
      card.appendChild(text);
      card.appendChild(name);
      card.appendChild(actions);
      messagesGrid.appendChild(card);
    });
  }

  function resetEditMode() {
    editIndex = -1;
    submitButton.textContent = "送出祝福";
    cancelEditButton.hidden = true;
    setSelectedSticker("💝");
  }

  function clearForm() {
    nameInput.value = "";
    messageInput.value = "";
    resetEditMode();
  }

  function startEdit(index) {
    var message = messages[index];
    if (!message) return;

    editIndex = index;
    nameInput.value = message.name || "";
    messageInput.value = message.text || "";
    setSelectedSticker(message.sticker || "💝");
    submitButton.textContent = "儲存修正";
    cancelEditButton.hidden = false;
    shareOutput.textContent = "正在修正一則祝福。";
    messageInput.focus();
  }

  function makeShareUrl(messages) {
    var url = window.location.href.split("#")[0];
    return url + "#messages=" + encodeMessages(messages);
  }

  function showManualCopy(url) {
    shareOutput.innerHTML = "";
    var note = document.createElement("div");
    note.textContent = "已產生離線分享連結：";
    var textarea = document.createElement("textarea");
    textarea.value = url;
    textarea.rows = 3;
    shareOutput.appendChild(note);
    shareOutput.appendChild(textarea);
    textarea.select();
  }

  function setSelectedSticker(sticker) {
    selectedSticker = isValidSticker(sticker) ? sticker : "💝";
    stickerButtons.forEach(function (button) {
      var isSelected = button.dataset.sticker === selectedSticker;
      button.classList.toggle("is-selected", isSelected);
      button.setAttribute("aria-pressed", String(isSelected));
    });
  }

  var messages = loadMessages();
  renderMessages(messages);

  stickerPicker.addEventListener("click", function (event) {
    var button = event.target.closest(".sticker-button");
    if (!button) return;

    setSelectedSticker(button.dataset.sticker);
  });

  messageForm.addEventListener("submit", function (event) {
    event.preventDefault();

    var text = messageInput.value.trim();
    if (!text) return;

    var nextMessage = {
      name: nameInput.value.trim() || "匿名祝福",
      sticker: selectedSticker,
      text: text
    };

    if (editIndex >= 0 && messages[editIndex]) {
      messages[editIndex] = nextMessage;
      shareOutput.textContent = "祝福已修正。";
    } else {
      messages.unshift(nextMessage);
      shareOutput.textContent = "祝福已送出。";
    }

    messages = sanitizeMessages(messages);
    saveMessages(messages);
    renderMessages(messages);
    clearForm();
  });

  messagesGrid.addEventListener("click", function (event) {
    var button = event.target.closest(".edit-message-button");
    if (!button) return;

    startEdit(Number(button.dataset.index));
  });

  cancelEditButton.addEventListener("click", function () {
    clearForm();
    shareOutput.textContent = "已取消修正。";
  });

  copyLinkButton.addEventListener("click", function () {
    var url = makeShareUrl(messages);

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(url).then(function () {
        shareOutput.textContent = "分享連結已複製。";
      }).catch(function () {
        showManualCopy(url);
      });
      return;
    }

    showManualCopy(url);
  });

  exportButton.addEventListener("click", function () {
    var blob = new Blob([JSON.stringify(messages, null, 2)], {
      type: "application/json"
    });
    var link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "honghao-wedding-blessings.json";
    link.click();
    URL.revokeObjectURL(link.href);
  });

  importInput.addEventListener("change", function () {
    var file = importInput.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function () {
      try {
        var imported = sanitizeMessages(JSON.parse(reader.result));
        messages = sanitizeMessages(imported.concat(messages));
        saveMessages(messages);
        renderMessages(messages);
        shareOutput.textContent = "祝福已匯入。";
      } catch (error) {
        shareOutput.textContent = "匯入檔案格式不正確。";
      }
      importInput.value = "";
    };
    reader.readAsText(file);
  });
})();

    </script>
  </body>
</html>
